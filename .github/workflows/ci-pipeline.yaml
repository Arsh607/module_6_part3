name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/arsh607/module_6_part3-backend
  TRANSACTIONS_IMAGE: ghcr.io/arsh607/module_6_part3-transactions
  PORTFOLIO_IMAGE: ghcr.io/arsh607/module_6_part3-studentportfolio

jobs:
  build-push-update-gitops:
    name: Build, Push, and Update GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Check out application repository
        uses: actions/checkout@v4

      - name: Validate backend Python
        run: python -m py_compile backend/app.py

      - name: Validate transactions JavaScript
        run: node --check transactions/server.js

      - name: Validate student portfolio
        run: test -f studentportfolio/index.html

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push transactions image
        uses: docker/build-push-action@v6
        with:
          context: ./transactions
          file: ./transactions/Dockerfile
          push: true
          tags: |
            ${{ env.TRANSACTIONS_IMAGE }}:${{ github.sha }}
            ${{ env.TRANSACTIONS_IMAGE }}:latest

      - name: Build and push student portfolio image
        uses: docker/build-push-action@v6
        with:
          context: ./studentportfolio
          file: ./studentportfolio/Dockerfile
          push: true
          tags: |
            ${{ env.PORTFOLIO_IMAGE }}:${{ github.sha }}
            ${{ env.PORTFOLIO_IMAGE }}:latest

      - name: Clone GitOps repository
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
          GITOPS_REPO: ${{ secrets.GITOPS_REPO }}
        run: |
          git clone "https://x-access-token:${GITOPS_PAT}@github.com/${GITOPS_REPO}.git" gitops

      - name: Copy Kubernetes manifests to GitOps repository
        run: |
          rm -rf gitops/k8s
          cp -R k8s gitops/k8s

      - name: Update image tags in GitOps manifests
        run: |
          sed -i "s|image: .*module_6_part3-backend:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" \
            gitops/k8s/backend-deployment.yaml

          sed -i "s|image: .*module_6_part3-transactions:.*|image: ${{ env.TRANSACTIONS_IMAGE }}:${{ github.sha }}|" \
            gitops/k8s/transactions-deployment.yaml

          sed -i "s|image: .*module_6_part3-studentportfolio:.*|image: ${{ env.PORTFOLIO_IMAGE }}:${{ github.sha }}|" \
            gitops/k8s/studentportfolio-deployment.yaml

      - name: Commit and push updated manifests
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/

          if git diff --cached --quiet; then
            echo "No GitOps manifest changes to commit."
          else
            git commit -m "GitOps: update images to ${{ github.sha }}"
            git push origin main
          fi