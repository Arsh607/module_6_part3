apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module-6-part3
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/arsh607/module_6_part3gitops.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true